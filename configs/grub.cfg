set default=0
set timeout=20

menuentry 'Fedora CoreOS aarch64' {
    linux /fcos/aarch64/kernel.aarch64 \
        ignition.firstboot ignition.platform.id=metal \
        coreos.live.rootfs_url=http://pxe.boot/fcos/aarch64/rootfs.aarch64.img
    initrd /fcos/aarch64/initramfs.aarch64.img
}

menuentry 'Fedora CoreOS x86_64' {
    linux /fcos/x86_64/kernel.x86_64 \
        ignition.firstboot ignition.platform.id=metal \
        coreos.live.rootfs_url=http://pxe.boot/fcos/x86_64/rootfs.x86_64.img
    initrd /fcos/x86_64/initramfs.x86_64.img
}