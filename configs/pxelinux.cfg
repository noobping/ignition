DEFAULT fcos-x86_64
PROMPT 0
TIMEOUT 20

LABEL fcos-x86_64
  KERNEL fcos/x86_64/kernel.x86_64
  APPEND initrd=fcos/x86_64/initramfs.x86_64.img ignition.firstboot ignition.platform.id=metal \
         coreos.live.rootfs_url=http://pxe.boot/fcos/x86_64/rootfs.x86_64.img \
         ignition.config.url=http://pxe.boot/ign/fcos.ign

LABEL fcos-aarch64
  KERNEL fcos/aarch64/kernel.aarch64
  APPEND initrd=fcos/aarch64/initramfs.aarch64.img ignition.firstboot ignition.platform.id=metal \
         coreos.live.rootfs_url=http://pxe.boot/fcos/aarch64/rootfs.aarch64.img \
         ignition.config.url=http://pxe.boot/ign/fcos.ign