<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PXE Boot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #f4f4f4;
            --text-color: #222;
            --loader-bg: #ddd;
            --loader-accent: #0078d4;
            --p-color: #444;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #222;
                --text-color: #fff;
                --loader-bg: #444;
                --loader-accent: #00bfff;
                --p-color: #bbb;
            }
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .loader {
            border: 8px solid var(--loader-bg);
            border-top: 8px solid var(--loader-accent);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
            transition: border 0.3s;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2em;
            letter-spacing: 2px;
        }

        p {
            color: var(--p-color);
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>PXE Boot</h1>
    <p>Please wait while your system is loading...</p>
</body>
</html>
